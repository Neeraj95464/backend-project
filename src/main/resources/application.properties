spring.application.name=AssetManagement

server.port=8080

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/AssetManagement
spring.datasource.username=root
spring.datasource.password=bail
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=AssetManagementPool

# Hibernate & JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# Logging SQL statements (optional)
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql=TRACE

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000


app.jwtSecret=my-secret-key-123
app.jwtExpirationMs=86400000

